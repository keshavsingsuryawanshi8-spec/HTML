<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Packages</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f1f2f6;
}

/* HEADER */
header{
background:#0a3d62;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:white;
text-decoration:none;
margin-left:15px;
font-weight:bold;
}

/* SECTION */
.section{
padding:40px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:30px;
}

/* PACKAGE CARD */
.card{
background:white;
width:300px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
margin:10px 0;
}

.price{
color:#e84118;
font-size:20px;
font-weight:bold;
}

.card p{
padding:0 15px;
color:#555;
}

.btn{
display:inline-block;
margin:15px;
padding:10px 18px;
background:#ff6b6b;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.btn:hover{
background:#ee5253;
}

/* FOOTER */
footer{
background:#222;
color:white;
text-align:center;
padding:12px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h2>🌍 TravelWorld</h2>
<div>
<a href="index.html">Home</a>
<a href="places.html">Places</a>
<a href="booking.html">Book</a>
</div>
</header>

<section class="section">
<h1>Our Tour Packages</h1>

<div class="container">

<div class="card">
<img src="goabeach.jpg.jpeg">
<h3>Goa Tour</h3>
<p>3 Days / 2 Nights Enjoy Goa Beach</p>
<div class="price">₹7,999</div>
<a href="booking.html" class="btn">Book Now</a>
</div>

<div class="card">
<img src="manalihills.jpg.jpeg">
<h3>Manali Adventure</h3>
<p>5 Days Hill Station Trip</p>
<div class="price">₹12,499</div>
<a href="booking.html" class="btn">Book Now</a>
</div>

<div class="card">
<img src="tajmahal.jpg.jpeg">
<h3>Agra Taj Tour</h3>
<p>2 Days Historical Visit</p>
<div class="price">₹4,999</div>
<a href="booking.html" class="btn">Book Now</a>
</div>

</div>
</section>

<footer>
<p>© 2026 Tourism Packages Page</p>
</footer>

</body>
</html>
