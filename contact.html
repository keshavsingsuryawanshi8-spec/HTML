<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f1f2f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* SUCCESS CARD */
.box{
background:white;
padding:40px;
width:420px;
text-align:center;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
animation:fadeIn 1s ease;
}

.box h1{
color:#2ecc71;
margin-bottom:15px;
}

.box p{
font-size:17px;
color:#555;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#0a3d62;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.btn:hover{
background:#07406a;
transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="box">
<h1>✅ Message Sent Successfully!</h1>
<p>Thank you for contacting us.<br>
We will reply to you as soon as possible 🌍</p>

<a href="index.html" class="btn">Back To Home</a>
</div>

</body>
</html>
