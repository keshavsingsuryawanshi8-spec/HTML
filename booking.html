<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Trip</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f1f2f6;
}

/* HEADER */
header{
background:#0a3d62;
color:white;
padding:15px;
text-align:center;
}

/* FORM BOX */
.container{
width:400px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.container h2{
text-align:center;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
border:none;
background:#ff6b6b;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ee5253;
transform:scale(1.03);
}

/* FOOTER */
footer{
text-align:center;
background:#222;
color:white;
padding:10px;
margin-top:50px;
}
</style>
</head>

<body>

<header>
<h1>🌍 Book Your Trip</h1>
</header>

<div class="container">
<h2>Travel Booking Form</h2>

<form action="confirm.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="date" required>

<select required>
<option value="" disabled selected>Select Destination</option>
<option value="">Chittorgarh</option>
<option value="">Ellora Caves</option>
<option value="">Udaipur Palce</option>
<option value="taj">Agra Taj Tour</option>
<option value="manali">Manlai Adventure</option>
<option value="goa">Goa Tour</option>
</select>

<input type="number" placeholder="Number of Persons" required>

<button type="submit">Confirm Booking</button>

</form>
</div>

<footer>
<p>© 2026 Tourism Booking Page</p>
</footer>

</body>
</html>
