<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#f4f4f4;
<a href="home1.html">Home</a>
}

/* ===== NAVBAR ===== */
header{
background:#0a3d62;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
letter-spacing:1px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:yellow;
}

/* ===== HERO SECTION ===== */
.hero{
height:90vh;
background:url("torism.jpg.jpeg") no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
border:none;
background:#ff6b6b;
color:white;
font-size:18px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
background:#ee5253;
transform:scale(1.05);
}

/* ===== PLACES ===== */
.places{
padding:50px;
text-align:center;
}

.places h2{
margin-bottom:30px;
}

.card-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:280px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:15px;
}

/* ===== ABOUT ===== */
.about{
background:#0a3d62;
color:white;
padding:40px;
text-align:center;
}

/* ===== FOOTER ===== */
footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}
</style>
</head>
